<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | Trade Center Logistics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #fb8c00;
            --primary-dark: #e67e22;
            --bg-dark: #0a192f;
            --card-bg: #112240;
            --text-white: #e6f1ff;
            --text-muted: #8892b0;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-white);
            padding: 2rem;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            color: var(--primary);
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        /* Login Overlay */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-box {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 1.5rem;
        }

        input {
            width: 100%;
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: white;
            border-radius: 6px;
            margin-bottom: 1rem;
        }

        /* Table */
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .status-pill {
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Modal */
        #shipment-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 900;
            padding: 1rem;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        select {
            width: 100%;
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: white;
            border-radius: 6px;
            margin-bottom: 1rem;
        }

        .checkpoints-area {
            margin-top: 1.5rem;
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }

        .checkpoint-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2>Admin Access</h2>
            <input type="password" id="admin-pass" placeholder="Enter Password" />
            <button class="btn btn-primary" id="login-btn" style="width: 100%;">Login</button>
        </div>
    </div>

    <div class="container">
        <header>
            <div>
                <h1>Admin Dashboard</h1>
                <p style="color: var(--text-muted)">Manage fake shipments and tracking data</p>
            </div>
            <button class="btn btn-primary" id="add-shipment-btn">+ Create Shipment</button>
        </header>

        <div class="card">
            <table id="shipments-table">
                <thead>
                    <tr>
                        <th>Tracking #</th>
                        <th>Status</th>
                        <th>Origin/Dest</th>
                        <th>ETA</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="shipments-body">
                    <!-- Rows injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Create/Edit Modal -->
    <div id="shipment-modal">
        <div class="modal-content">
            <h2 id="modal-title" style="margin-bottom: 1.5rem;">Create New Shipment</h2>
            <form id="shipment-form">
                <input type="hidden" id="field-id" />

                <div class="grid">
                    <div>
                        <label>Tracking Number</label>
                        <input type="text" id="field-num" placeholder="TCL-123456" required />
                    </div>
                    <div>
                        <label>Current Status</label>
                        <select id="field-status">
                            <option value="processing">Processing</option>
                            <option value="in-transit">In Transit</option>
                            <option value="out-delivery">Out for Delivery</option>
                            <option value="delivered">Delivered</option>
                            <option value="exception">Exception</option>
                        </select>
                    </div>
                </div>

                <div class="grid">
                    <div>
                        <label>Origin (e.g. US)</label>
                        <input type="text" id="field-origin" placeholder="New York, US" />
                    </div>
                    <div>
                        <label>Destination (e.g. GB)</label>
                        <input type="text" id="field-dest" placeholder="London, GB" />
                    </div>
                </div>

                <div class="grid">
                    <div>
                        <label>Carrier</label>
                        <input type="text" id="field-carrier" value="Trade Center Logistics" />
                    </div>
                    <div>
                        <label>ETA / Date</label>
                        <input type="text" id="field-eta" placeholder="March 15, 2026" />
                    </div>
                </div>

                <div class="checkpoints-area">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                        <h3>Journey Checkpoints</h3>
                        <button type="button" class="btn btn-outline" id="add-cp-btn"
                            style="padding: 0.3rem 0.8rem; font-size: 0.8rem;">+ Add Update</button>
                    </div>
                    <div id="checkpoints-list">
                        <!-- Checkpoint rows injected here -->
                    </div>
                </div>

                <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: flex-end;">
                    <button type="button" class="btn btn-outline" id="close-modal-btn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Shipment</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="/src/admin.ts"></script>
</body>

</html>
